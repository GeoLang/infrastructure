# GeoLang Platform — CI/CD Pipeline
#
# Builds, pushes, and deploys all GeoLang services to AWS ECS Fargate.
#
# Triggers:
#   - Push to main branch (auto-deploy to prod)
#   - Push to develop branch (auto-deploy to dev)
#   - Manual dispatch with service selection
#
# Prerequisites (GitHub Secrets):
#   AWS_ACCESS_KEY_ID       — IAM user with ECR/ECS permissions
#   AWS_SECRET_ACCESS_KEY   — IAM user secret key
#   AWS_REGION              — e.g., us-east-1
#   AWS_ACCOUNT_ID          — 12-digit AWS account ID
#   TF_VAR_db_password      — RDS password (for terraform apply)

name: Deploy GeoLang Platform

on:
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      services:
        description: "Services to deploy (comma-separated, or 'all')"
        required: true
        default: "all"
        type: string
      environment:
        description: "Target environment"
        required: true
        default: "prod"
        type: choice
        options:
          - dev
          - staging
          - prod
      terraform_action:
        description: "Terraform action"
        required: true
        default: "apply"
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
  PROJECT_NAME: geolang
  TERRAFORM_VERSION: "1.9"

permissions:
  id-token: write
  contents: read

jobs:
  # ── Determine what to build ──────────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.detect.outputs.services }}
      infra_changed: ${{ steps.detect.outputs.infra_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed services
        id: detect
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ inputs.services }}" == "all" ]]; then
              echo 'services=["ptolemy","tiletopia","geokode","itinera","geolang","viewtopia"]' >> $GITHUB_OUTPUT
            else
              # Convert comma-separated to JSON array
              services=$(echo "${{ inputs.services }}" | tr ',' '\n' | jq -R . | jq -sc .)
              echo "services=$services" >> $GITHUB_OUTPUT
            fi
            echo "infra_changed=true" >> $GITHUB_OUTPUT
          else
            # Auto-detect changes from git diff
            changed_files=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
            services=()
            
            for svc in ptolemy tiletopia geokode itinera geolang viewtopia; do
              if echo "$changed_files" | grep -q "^${svc}/"; then
                services+=("\"$svc\"")
              fi
            done
            
            if [[ ${#services[@]} -eq 0 ]]; then
              echo 'services=[]' >> $GITHUB_OUTPUT
            else
              echo "services=[$(IFS=,; echo "${services[*]}")]" >> $GITHUB_OUTPUT
            fi
            
            if echo "$changed_files" | grep -q "^infrastructure/"; then
              echo "infra_changed=true" >> $GITHUB_OUTPUT
            else
              echo "infra_changed=false" >> $GITHUB_OUTPUT
            fi
          fi

  # ── Terraform Plan/Apply ─────────────────────────────────────────────────
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.infra_changed == 'true'
    defaults:
      run:
        working-directory: infrastructure
    env:
      TF_VAR_db_password: ${{ secrets.TF_VAR_db_password }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: |
          ENV=${{ inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'dev') }}
          PROFILE="profiles/${ENV == 'prod' && 'platform' || 'minimal'}.tfvars"
          
          if [[ -f "$PROFILE" ]]; then
            terraform plan -var-file="$PROFILE" -out=tfplan
          else
            terraform plan -out=tfplan
          fi

      - name: Terraform Apply
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && inputs.terraform_action == 'apply')
        run: terraform apply -auto-approve tfplan

  # ── Build & Push Container Images ────────────────────────────────────────
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [changes, terraform]
    if: |
      always() &&
      needs.changes.outputs.services != '[]' &&
      (needs.terraform.result == 'success' || needs.terraform.result == 'skipped')
    strategy:
      matrix:
        service: ${{ fromJSON(needs.changes.outputs.services) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
        with:
          path: workspace

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine image tag
        id: meta
        run: |
          ENV=${{ inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'dev') }}
          REPO="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.PROJECT_NAME }}-${ENV}-${{ matrix.service }}"
          SHA=$(echo "${{ github.sha }}" | head -c 7)
          echo "repo=$REPO" >> $GITHUB_OUTPUT
          echo "sha_tag=${REPO}:${SHA}" >> $GITHUB_OUTPUT
          echo "latest_tag=${REPO}:latest" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: workspace/${{ matrix.service }}
          push: true
          tags: |
            ${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.latest_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to ECS ───────────────────────────────────────────────────────
  deploy:
    name: Deploy ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: |
      always() &&
      needs.build.result == 'success'
    strategy:
      matrix:
        service: ${{ fromJSON(needs.changes.outputs.services) }}
      max-parallel: 2
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to ECS
        run: |
          ENV=${{ inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'dev') }}
          CLUSTER="${{ env.PROJECT_NAME }}-${ENV}"
          SERVICE="${{ env.PROJECT_NAME }}-${ENV}-${{ matrix.service }}"
          
          echo "Deploying ${{ matrix.service }} to ${CLUSTER}..."
          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$SERVICE" \
            --force-new-deployment

      - name: Wait for deployment
        run: |
          ENV=${{ inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'dev') }}
          CLUSTER="${{ env.PROJECT_NAME }}-${ENV}"
          SERVICE="${{ env.PROJECT_NAME }}-${ENV}-${{ matrix.service }}"
          
          echo "Waiting for ${SERVICE} to stabilize..."
          aws ecs wait services-stable \
            --cluster "$CLUSTER" \
            --services "$SERVICE" \
            || echo "Warning: Service did not stabilize within timeout"

  # ── Health Check ─────────────────────────────────────────────────────────
  healthcheck:
    name: Platform Health Check
    runs-on: ubuntu-latest
    needs: deploy
    if: needs.deploy.result == 'success'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get platform URL
        id: url
        run: |
          ENV=${{ inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'dev') }}
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names "${{ env.PROJECT_NAME }}-${ENV}-alb" \
            --query 'LoadBalancers[0].DNSName' --output text 2>/dev/null || echo "")
          
          if [[ -n "$ALB_DNS" ]]; then
            echo "url=http://${ALB_DNS}" >> $GITHUB_OUTPUT
          else
            echo "url=" >> $GITHUB_OUTPUT
          fi

      - name: Run health checks
        if: steps.url.outputs.url != ''
        run: |
          URL="${{ steps.url.outputs.url }}"
          
          echo "Checking platform health at ${URL}..."
          
          endpoints=(
            "/api/v1/health:Ptolemy"
            "/tiles/v1/health:TileTopia"
            "/agent/health:GeoLang"
          )
          
          failed=0
          for ep in "${endpoints[@]}"; do
            path="${ep%%:*}"
            name="${ep##*:}"
            status=$(curl -s -o /dev/null -w "%{http_code}" "${URL}${path}" --max-time 10 2>/dev/null || echo "000")
            if [[ "$status" == "200" ]]; then
              echo "✅ ${name} (${path}): OK"
            else
              echo "⚠️  ${name} (${path}): HTTP ${status}"
              ((failed++))
            fi
          done
          
          if [[ $failed -gt 0 ]]; then
            echo ""
            echo "Warning: ${failed} health check(s) failed. Services may still be starting."
          fi
